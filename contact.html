<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Tech | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Interactive Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">MAD Tech<span>.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="waitlist.html">Waitlist</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="news.html">News</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Contact Section -->
            <section id="contact" class="view active-view" style="opacity: 1; visibility: visible; pointer-events: auto; position: relative; transform: none;">
                <div class="form-container">
                    <h2>Contact Us</h2>
                    <p>Have questions? We'd love to hear from you.</p>
                    <form id="contact-form">
                        <div class="input-group">
                            <label for="contact-name">Name</label>
                            <input type="text" id="contact-name" name="name" required placeholder="Jane Doe">
                        </div>
                        <div class="input-group">
                            <label for="contact-email">Email Address</label>
                            <input type="email" id="contact-email" name="email" required placeholder="jane@example.com">
                        </div>
                        <div class="input-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" name="message" required rows="4" placeholder="How can we help?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-full" id="contact-submit">Send Message</button>
                    </form>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; <span id="current-year"></span> MAD Tech. All rights reserved.</p>
        </footer>
    </div>

    <!-- Tooltip Element (Popper.js target) -->
    <div id="tooltip" role="tooltip">
        Fields cannot be empty!
        <div id="arrow" data-popper-arrow></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
