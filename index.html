<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Tech | The Future of Innovation</title>
    <meta name="description" content="MAD Tech is a visionary tech startup revolutionizing the way we interact with data and the digital world.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">MAD Tech<span>.</span></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="waitlist.html">Waitlist</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="news.html">News</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Home Section -->
            <section id="home" class="view active-view" style="opacity: 1; visibility: visible; pointer-events: auto; position: relative; transform: none;">
                <div class="hero-content">
                    <h1 class="glitch" data-text="Redefining the Future.">Redefining the Future.</h1>
                    <p>We are building the next generation of seamless digital experiences. Our mission is to empower individuals through intuitive, invisible technology.</p>
                    <div class="cta-buttons">
                        <button class="btn btn-primary" onclick="window.location.href='waitlist.html'">Join the Waitlist</button>
                        <button class="btn btn-secondary" onclick="window.location.href='contact.html'">Get in Touch</button>
                    </div>
                </div>
                <div class="hero-graphic">
                    <div class="hero-images">
                        <div class="hero-img-card hero-img-main">
                            <img src="https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=600&q=80" alt="AI technology visualization" />
                        </div>
                        <div class="hero-img-card hero-img-sm hero-img-top">
                            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=300&q=80" alt="Tech circuit board" />
                        </div>
                        <div class="hero-img-card hero-img-sm hero-img-bot">
                            <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=300&q=80" alt="Developer coding" />
                        </div>
                    </div>
                    <div class="orb"></div>
                    <div class="orb orb-2"></div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; <span id="current-year"></span> MAD Tech. All rights reserved.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
