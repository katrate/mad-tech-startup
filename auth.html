<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD Tech | Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-toggle { text-align: center; margin-top: 1rem; cursor: pointer; color: var(--accent); }
        .hidden { display: none !important; }
        .profile-container { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <!-- Interactive Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">MAD Tech<span>.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="waitlist.html">Waitlist</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="auth.html" class="active" id="nav-auth-link">Sign In</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <section id="auth" class="view active-view" style="opacity: 1; visibility: visible; pointer-events: auto; position: relative; transform: none;">
                <div class="form-container" id="auth-box">
                    <h2 id="auth-title">Sign In</h2>
                    <p id="auth-subtitle">Access your account.</p>
                    <form id="auth-form">
                        <div class="input-group hidden" id="signup-username-group">
                            <label for="auth-username">Username</label>
                            <input type="text" id="auth-username" name="username" placeholder="cool_user_123">
                        </div>
                        <div class="input-group">
                            <label id="auth-email-label" for="auth-email">Email or Username</label>
                            <input type="text" id="auth-email" name="email" required placeholder="hello@example.com or cool_user">
                        </div>
                        <div class="input-group">
                            <label for="auth-password">Password</label>
                            <input type="password" id="auth-password" name="password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-full" id="auth-submit">Sign In</button>
                    </form>
                    <p class="auth-toggle" id="auth-toggle-btn">Need an account? Sign Up</p>
                </div>

                <div class="form-container hidden" id="profile-box">
                    <div style="text-align: center; margin-bottom: 2.5rem;">
                        <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: white; box-shadow: 0 8px 25px rgba(99,102,241,0.4);">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Your Profile</h2>
                        <p style="color: var(--text-secondary); font-size: 0.95rem;">Manage your public persona.</p>
                    </div>

                    <form id="profile-form">
                        <div class="input-group">
                            <label for="profile-username"><i class="fa-solid fa-at" style="color: var(--accent-primary); margin-right: 0.4rem;"></i> Username</label>
                            <input type="text" id="profile-username" name="username" placeholder="cool_user_123">
                        </div>
                        <div class="input-group">
                            <label for="profile-bio"><i class="fa-solid fa-pen-nib" style="color: var(--accent-primary); margin-right: 0.4rem;"></i> Bio</label>
                            <textarea id="profile-bio" name="bio" rows="3" placeholder="Tell us about yourself"></textarea>
                        </div>
                        <div class="input-group">
                            <label for="profile-gender"><i class="fa-solid fa-venus-mars" style="color: var(--accent-primary); margin-right: 0.4rem;"></i> Gender</label>
                            <select id="profile-gender" name="gender" style="width: 100%; padding: 0.8rem 1rem; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: var(--font-sans); appearance: none; -webkit-appearance: none;">
                                <option value="" disabled selected style="background: var(--bg-dark); color: white;">Select your gender</option>
                                <option value="Male" style="background: var(--bg-dark); color: white;">Male</option>
                                <option value="Female" style="background: var(--bg-dark); color: white;">Female</option>
                                <option value="Non-binary" style="background: var(--bg-dark); color: white;">Non-binary</option>
                                <option value="Prefer not to say" style="background: var(--bg-dark); color: white;">Prefer not to say</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-full" style="margin-top: 1rem; padding: 1rem;"><i class="fa-solid fa-save"></i> Save Profile</button>
                    </form>

                    <div style="margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.08); text-align: center;">
                        <button class="btn btn-secondary w-full" id="btn-signout" style="border-color: rgba(236,72,153,0.3); color: #ec4899; background: rgba(236,72,153,0.05);">
                            <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                        </button>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; <span id="current-year"></span> MAD Tech. All rights reserved.</p>
        </footer>
    </div>

    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
